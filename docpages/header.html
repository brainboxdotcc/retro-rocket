<!DOCTYPE html>
<html lang="$langISO">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=11">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--BEGIN PROJECT_NAME--><title>$projectname: $title</title><!--END PROJECT_NAME-->
    <!--BEGIN !PROJECT_NAME--><title>$title</title><!--END !PROJECT_NAME-->

    <!--BEGIN PROJECT_ICON-->
    <link rel="icon" href="$relpath^$projecticon" type="image/x-icon">
    <!--END PROJECT_ICON-->

    <link href="$relpath^tabs.css" rel="stylesheet" type="text/css">
    <!--BEGIN FULL_SIDEBAR-->
    <script type="text/javascript">var page_layout=1;</script>
    <!--END FULL_SIDEBAR-->
    <script type="text/javascript" src="$relpath^jquery.js"></script>
    <script type="text/javascript" src="$relpath^dynsections.js"></script>
    <!--BEGIN COPY_CLIPBOARD-->
    <script type="text/javascript" src="$relpath^clipboard.js"></script>
    <!--END COPY_CLIPBOARD-->
    $treeview
    $search
    $mathjax
    $darkmode

    <meta name="title" content="$title - Retro Rocket OS">
    <meta name="description" content="A small operating system in the spirit of the 1980s micros. A system you can actually understand, not just use.">
    <meta name="author" content="Retro Rocket Developers">
    <meta name="robots" content="index, follow">

    <link rel="canonical" href="https://retrorocket.dev/">

    <meta name="theme-color" content="#0b0f14">

    <link rel="icon" href="$relpath^rr.png">

    <meta property="og:locale" content="en_GB">
    <meta property="og:title" content="$title - Retro Rocket OS">
    <meta property="og:description" content="A small operating system in the spirit of the 1980s micros. A system you can actually understand, not just use.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://retrorocket.dev/">
    <meta property="og:image" content="https://retrorocket.dev/images/leader4.png">
    <meta property="og:image:alt" content="Retro Rocket OS running on a retro-style desktop">
    <meta property="og:site_name" content="Retro Rocket OS">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="$title - Retro Rocket OS">
    <meta name="twitter:description" content="A small operating system in the spirit of the 1980s micros. A system you can actually understand, not just use.">
    <meta name="twitter:image" content="https://retrorocket.dev/images/leader4.png">

    <link rel="preload" as="image" href="https://retrorocket.dev/images/leader4.png">

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "Retro Rocket OS",
            "operatingSystem": "x86-64",
            "applicationCategory": "OperatingSystem",
            "description": "A small operating system in the spirit of the 1980s micros. A system you can actually understand, not just use.",
            "url": "https://retrorocket.dev/"
        }
    </script>

    <link href="$relpath^$stylesheet" rel="stylesheet" type="text/css">
    $extrastylesheet
</head>
<body>
<!--BEGIN FULL_SIDEBAR-->
<div id="side-nav" class="ui-resizable side-nav-resizable"><!-- do not remove this div, it is closed by doxygen! -->
    <!--END FULL_SIDEBAR-->

    <div id="top"><!-- do not remove this div, it is closed by doxygen! -->

        <!--BEGIN TITLEAREA-->
        <div id="titlearea">
            <table cellspacing="0" cellpadding="0">
                <tbody>
                <tr id="projectrow">
                    <!--BEGIN PROJECT_LOGO-->
                    <td id="projectlogo"><img alt="Logo" src="$relpath^$projectlogo"$logosize></td>
                    <!--END PROJECT_LOGO-->
                    <!--BEGIN PROJECT_NAME-->
                    <td id="projectalign">
                        <div id="projectname">$projectname<!--BEGIN PROJECT_NUMBER--><span id="projectnumber">&#160;$projectnumber</span><!--END PROJECT_NUMBER--></div>
                        <!--BEGIN PROJECT_BRIEF--><div id="projectbrief">$projectbrief</div><!--END PROJECT_BRIEF-->
                    </td>
                    <!--END PROJECT_NAME-->
                    <!--BEGIN !PROJECT_NAME-->
                    <!--BEGIN PROJECT_BRIEF-->
                    <td>
                        <div id="projectbrief">$projectbrief</div>
                    </td>
                    <!--END PROJECT_BRIEF-->
                    <!--END !PROJECT_NAME-->
                    <!--BEGIN DISABLE_INDEX-->
                    <!--BEGIN SEARCHENGINE-->
                    <!--BEGIN !FULL_SIDEBAR-->
                    <td>$searchbox</td>
                    <!--END !FULL_SIDEBAR-->
                    <!--END SEARCHENGINE-->
                    <!--END DISABLE_INDEX-->
                </tr>
                <!--BEGIN SEARCHENGINE-->
                <!--BEGIN FULL_SIDEBAR-->
                <tr><td colspan="2">$searchbox</td></tr>
                <!--END FULL_SIDEBAR-->
                <!--END SEARCHENGINE-->
                </tbody>
            </table>
        </div>
        <!--END TITLEAREA-->
        <!-- end header part -->
